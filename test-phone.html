<!DOCTYPE html>
<html>
<body>
  <button onclick="testPrint()" style="font-size:24px;padding:16px;">
    Test Print From Phone
  </button>

  <pre id="log"></pre>

  <script>
    function log(message) {
      document.getElementById("log").textContent += message + "\n";
    }

    function testPrint() {
      const ws = new WebSocket("ws://192.168.110.176:1945");

      ws.onopen = () => {
        log("Connected ✅");

        const payload = {
          from: "posclient",

          printer_name: "smb://localhost/XP-80C",

          printer_settings: {
            interface: "windows-usb",
            printer_name: "XP-80C",
            template: "epson",
            pull_cash_drawer: false,
            line_feed_each_in_items: 1,
            more_new_line: 3,
            custom_print_header: [
              "MY SHOP",
              "Phone Test"
            ],
            custom_print_footer: [
              "Thank you!"
            ]
          },

          receipt_data: {
            app_name: "MY SHOP",
            store_address: "Phnom Penh",
            full_name: "Cashier",
            transaction: {
              date_transaction: new Date().toLocaleString(),
              transaction: "PHONE-TEST-001",
              customer_name: "Walk-in Customer",
              total_transaction: 12,
              paid: 12,
              paid_return: 0,
              payment: "Cash"
            },
            cart: [
              {
                item_name: "Hawai Shirt XL",
                price: 6,
                qty: 1,
                sub_total: 6
              }
            ],
            promo: []
          }
        };

        ws.send(JSON.stringify(payload));
        log("Payload sent ✅");

        setTimeout(() => {
          ws.close();
          log("Connection closed");
        }, 1500);
      };

      ws.onmessage = (event) => {
        log("Server: " + event.data);
      };

      ws.onerror = () => {
        log("WebSocket error ❌");
      };

      ws.onclose = (event) => {
        log("Closed code: " + event.code);
      };
    }
  </script>
</body>
</html>
